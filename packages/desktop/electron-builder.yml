appId: com.claudget.app
productName: claudget
copyright: Copyright © 2026 claudget contributors

# Pinned because npm workspaces hoist `electron` to the root node_modules, where
# electron-builder's auto-detection can't find it. Keep in sync with the electron devDep.
electronVersion: 42.4.1

# Free distribution, no paid certs. Releases are published to GitHub Releases.
publish:
  provider: github
  owner: manankapoor23
  repo: claudget

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources
    to: .
    filter:
      - '**/*'

# Don't pull the whole symlinked workspace into the asar — core is bundled.
removePackageScripts: true
npmRebuild: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: claudget
  artifactName: ${productName}-${version}-Setup-${arch}.${ext}

portable:
  artifactName: ${productName}-${version}-Portable-${arch}.${ext}

mac:
  target:
    - target: dmg
      arch: [universal]
  category: public.app-category.developer-tools
  icon: build/icon.icns
  # Unsigned + ad-hoc signed (no paid Apple cert). The app launches on Apple
  # Silicon; users clear Gatekeeper quarantine once on first open
  # (right-click → Open, or `xattr -cr "/Applications/claudget.app"`).
  identity: null
  notarize: false

linux:
  target:
    - AppImage
  category: Utility
  icon: build/icon.png
  maintainer: Claude Widget contributors
